# version: "3.3"

services:
  postgres:
    container_name: pg_crisv2
    image: postgres:16
    environment:
      - POSTGRES_DB=crisv2
      - POSTGRES_USER=cris
      - POSTGRES_PASSWORD=admin123
    ports:
      - 5432:5432
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@mail.com
      - PGADMIN_DEFAULT_PASSWORD=admin123
    ports:
      - 5050:80
